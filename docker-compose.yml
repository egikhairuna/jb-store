# POS System — Production Docker Compose
# Joins the existing 'proxy_net' reverse-proxy network (already created externally).
# Port 3001 is NOT exposed to the host — only reachable by the NGINX container
# via the shared Docker network (proxy_net).

services:
  pos-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pos-system:latest          # tag so you can reference it easily
    container_name: pos-app
    restart: unless-stopped

    # ── Environment ────────────────────────────────────────────
    env_file:
      - .env.production               # created on server, never committed to git
    environment:
      NODE_ENV: production
      # DATABASE_URL is now in a subfolder so the volume mount doesn't hide migrations
      DATABASE_URL: "file:/app/prisma/db/pos.db"
      PORT: "3001"

    # ── Volumes ────────────────────────────────────────────────
    volumes:
      # SQLite database persisted in a subfolder
      - sqlite_data:/app/prisma/db

    # ── Network ────────────────────────────────────────────────
    networks:
      - proxy_net                     # joins the existing external NGINX network

    # ── Health check ───────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Resource limits (adjust to your VPS capacity) ──────────
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M
        reservations:
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ──────────────────────────────────────────────────
volumes:
  sqlite_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  proxy_net:
    external: true                    # MUST exist — created by your NGINX stack
