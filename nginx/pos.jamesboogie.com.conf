# ─────────────────────────────────────────────────────────────────
#  NGINX reverse proxy config for: pos.jamesboogie.com
#  HTTP only (port 80) — SSL to be added later via Certbot.
#
#  Placement on server:
#    /etc/nginx/sites-available/pos.jamesboogie.com.conf
#  Enable with:
#    ln -s /etc/nginx/sites-available/pos.jamesboogie.com.conf \
#           /etc/nginx/sites-enabled/
#    nginx -t && nginx -s reload
#
#  If your NGINX is already containerised, mount this file into
#  the container at /etc/nginx/conf.d/pos.conf instead.
# ─────────────────────────────────────────────────────────────────

# ── Upstream definition ──────────────────────────────────────────
# 'pos-app' resolves via Docker DNS inside proxy_net
upstream pos_upstream {
    server pos-app:3001;
    keepalive 32;                   # reuse connections — reduces TCP overhead
}

# ── Main server block ────────────────────────────────────────────
server {
    listen 80;
    server_name pos.jamesboogie.com;

    # ── Logging ─────────────────────────────────────────────────
    access_log  /var/log/nginx/pos.access.log  combined buffer=64k flush=5s;
    error_log   /var/log/nginx/pos.error.log   warn;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    # Uncomment once SSL is live:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip compression ─────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;            # balance between CPU and compression ratio
    gzip_min_length   1024;         # don't bother compressing tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Buffer sizing (tuned for Next.js SSR responses) ──────────
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;

    # ── Static assets: Next.js /_next/static/* ──────────────────
    # These are immutable (content-hashed) — cache aggressively.
    location /_next/static/ {
        proxy_pass         http://pos_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # 1 year immutable cache — safe because filenames include content hash
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Public static files (images, icons, etc.) ────────────────
    location /public/ {
        proxy_pass         http://pos_upstream;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── API routes: no caching ────────────────────────────────────
    location /api/ {
        proxy_pass         http://pos_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── All other routes (SSR pages, auth, etc.) ─────────────────
    location / {
        proxy_pass         http://pos_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Short cache for SSR pages — adjust per route needs
        add_header Cache-Control "public, max-age=0, must-revalidate" always;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Return 502 page if app is down (instead of blank page)
        error_page 502 503 504 /upstream_error.html;
    }

    # ── Upstream error page ───────────────────────────────────────
    location = /upstream_error.html {
        internal;
        return 503 "POS system is temporarily unavailable. Please try again shortly.";
        add_header Content-Type text/plain always;
    }

    # ── Disallow common attack paths ─────────────────────────────
    location ~ /\. {
        deny all;
    }
}
